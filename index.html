<!-- Asset hints -->
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="dns-prefetch"  href="https://www.gstatic.com">

<style>
  :root{
    --bg:#f3f1ec; --bg2:#e9e5dd; --ink:#1c1a16; --muted:#6b6660;
    --accent:#1c1a16; --line:rgba(0,0,0,.08); --card:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0;display:flex}
  #stage{flex:1;position:relative;background:radial-gradient(ellipse at 50% 35%,#fbfaf7 0%,var(--bg) 55%,var(--bg2) 100%)}
  canvas{display:block;width:100%;height:100%;outline:none}
  #panel{
    width:340px;background:var(--card);border-left:1px solid var(--line);
    padding:22px 22px 28px;overflow:auto;display:flex;flex-direction:column;gap:22px;
    box-shadow:-10px 0 30px rgba(0,0,0,.04)
  }
  h1{font-size:18px;letter-spacing:.2px;margin:0 0 4px;font-weight:600}
  .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .group{display:flex;flex-direction:column;gap:8px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:2px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;font-size:13px;color:var(--ink);transition:.12s ease}
  .chip:hover{border-color:#bbb}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip[disabled]{opacity:.35;cursor:not-allowed}
  .frames{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .frame{border:1px solid var(--line);border-radius:14px;padding:12px 8px;background:#fff;cursor:pointer;text-align:center;transition:.15s ease;display:flex;flex-direction:column;align-items:center;gap:6px}
  .frame:hover{border-color:#bbb}
  .frame.active{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .frame svg{width:72px;height:44px;display:block}
  .frame .nm{font-size:13px;font-weight:600}
  .frame .sz{font-size:11px;color:var(--muted)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .switch{position:relative;width:36px;height:20px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#dcd8d0;border-radius:999px;transition:.15s}
  .slider:after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider:after{transform:translateX(16px)}
  .switch input:disabled + .slider{opacity:.4;cursor:not-allowed}
  .stones{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .swatch{aspect-ratio:1;border-radius:10px;border:2px solid transparent;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .swatch.active{border-color:var(--accent)}
  .summary{font-size:13px;color:var(--ink);background:#faf8f3;border:1px solid var(--line);border-radius:12px;padding:12px}
  .price-box{display:flex;align-items:baseline;justify-content:space-between;padding:14px 16px;background:#1c1a16;color:#fff;border-radius:12px}
  .price-box[hidden]{display:none}
  .price-label{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6)}
  .price-amount{font-size:22px;font-weight:600;letter-spacing:.2px}
  .price-amount.loading{opacity:.4}
  .summary b{font-weight:600}
  .summary .dim{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted)}
  .summary .dim b{color:var(--ink)}
  .btn{display:block;width:100%;padding:13px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.2px}
  .btn:hover{opacity:.9}
  .hud{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);padding:10px 14px;border-radius:12px;font-size:12px;color:var(--muted);border:1px solid var(--line)}
  .hud kbd{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink)}
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(243,241,236,.92);z-index:20;font-size:14px;color:var(--muted);gap:14px}
  .loading.hidden{display:none}
  .loading .icon{width:64px;height:64px;display:block}
  .loading .icon path{stroke:var(--ink);stroke-width:2;fill:none}
  .loading .pulse{transform-origin:center;animation:pulse 1.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.25}50%{opacity:1}}
  .loading .label{font-size:14px;color:var(--ink);letter-spacing:.02em}
  .loading .bar{width:180px;height:3px;background:rgba(0,0,0,.08);border-radius:999px;overflow:hidden}
  .loading .bar > div{height:100%;background:var(--accent);width:0;transition:width .25s ease}
  .loading .pct{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .small{font-size:11px;color:var(--muted)}
  .toolbar{position:absolute;right:16px;top:16px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;max-width:60%;justify-content:flex-end}
  .tbtn{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:12px;cursor:pointer;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
  .tbtn:hover{background:#fff}
  .tbtn[hidden]{display:none}
  .toast{position:absolute;left:50%;bottom:60px;transform:translateX(-50%);background:rgba(28,26,22,.92);color:#fff;padding:9px 16px;border-radius:999px;font-size:13px;backdrop-filter:blur(8px);z-index:30;transition:opacity .3s ease,transform .3s ease;opacity:0;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .toast[hidden]{display:none}
  .topleft{position:absolute;left:16px;top:16px;display:flex;gap:6px;z-index:2}
  /* Language switcher */
  .langs{display:inline-flex;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .langbtn{background:transparent;border:0;padding:6px 9px;font-size:12px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;gap:4px;letter-spacing:.04em;font-weight:500}
  .langbtn:hover{background:rgba(0,0,0,.04);color:var(--ink)}
  .langbtn.active{background:var(--accent);color:#fff}
  .langbtn svg{width:14px;height:10px;display:block;border-radius:1px;box-shadow:0 0 0 0.5px rgba(0,0,0,.1)}
  @media (max-width:760px){
    #app{flex-direction:column}
    #panel{width:100%;border-left:0;border-top:1px solid var(--line);max-height:60vh}
    #stage{flex:1 1 40vh;min-height:40vh}
    .toolbar{top:8px;right:8px;gap:4px}
    .topleft{top:8px;left:8px}
    .langbtn{padding:5px 7px;font-size:11px}
    .hud{display:none}
  }
</style>
</head>

  </aside>
</div>

function detectLang(){
  const q = new URLSearchParams(location.search).get('lang');
  if (q && I18N[q]) return q;
  try {
    const ls = localStorage.getItem('picnic.lang');
    if (ls && I18N[ls]) return ls;
  } catch(_){}
  const nav = (navigator.language || 'en').slice(0,2).toLowerCase();
  if (I18N[nav]) return nav;
  return 'en';
}

let currentLang = detectLang();

function t(key){ return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key]) || key; }

function applyLang(code){
  if (!I18N[code]) code = 'en';
  currentLang = code;
  try { localStorage.setItem('picnic.lang', code); } catch(_){}
  document.documentElement.lang = code;
  // text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  // titles
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.setAttribute('title', t(el.getAttribute('data-i18n-title')));
  });

function closestNative(family, L){

  return arr.reduce((best, n) => Math.abs(n-L) < Math.abs(best-L) ? n : best, arr[0]);

// === Loading progress ===
// Each major asset contributes to the global progress %.
// We use rough weights so the bar moves smoothly (xset.glb is ~4.5MB so the
// biggest chunk).
const LOAD_WEIGHTS = { 'angle': 22, 'xset': 70, 'wood': 8 };
const loadState = { angle:0, xset:0, wood:0 };
function setLoadProgress(key, fraction){
  loadState[key] = Math.max(0, Math.min(1, fraction || 0));
  let total = 0, full = 0;
  for (const k of Object.keys(LOAD_WEIGHTS)){
    total += LOAD_WEIGHTS[k];
    full += LOAD_WEIGHTS[k] * (loadState[k] || 0);
  }
  const pct = Math.round((full/total) * 100);
  const bar = document.getElementById('loadBar');
  const out = document.getElementById('loadPct');
  if (bar) bar.style.width = pct + '%';
  if (out) out.textContent = pct + ' %';
}

function loadGLB(url, key){
  return new Promise((res, rej) => {
    loader.load(url, g => { setLoadProgress(key, 1); res(g.scene); }, ev => {
      if (ev && ev.lengthComputable && ev.total) setLoadProgress(key, ev.loaded / ev.total);
    }, rej);
  });
}

function loadWoodTex(){
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      setLoadProgress('wood', 1);
      const tex = new THREE.Texture(img);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      tex.needsUpdate = true;
      res(tex);
    };
    img.onerror = rej;
    img.src = URL_WOOD;
    // Image events don't fire progress reliably — show 50% on initial decode
    setLoadProgress('wood', 0.4);
  });
}

function alignWoodToMesh(mesh, baseTex){
  const geom = mesh.geometry;
  const PRI = 2, SEC = 0;
  const tile = 0.7;
  const pos = geom.attributes.position;
  const arr = new Float32Array(pos.count * 2);
  for (let i = 0; i < pos.count; i++){
    const p = [pos.getX(i), pos.getY(i), pos.getZ(i)];
    arr[i*2]     = p[PRI] / tile;
    arr[i*2 + 1] = p[SEC] / tile;
  }
  geom.setAttribute('uv', new THREE.BufferAttribute(arr, 2));
  return baseTex;
}

function makeMetalNormalMap(){
  const size = 256;
  const c = document.createElement('canvas'); c.width = c.height = size;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(size, size); const d = img.data;
  for (let y = 0; y < size; y++){
    for (let x = 0; x < size; x++){
      const i = (y*size + x) * 4;
      const nx = (Math.random()-0.5) * 0.18;
      const ny = (Math.random()-0.5) * 0.18;
      d[i  ] = Math.round((nx*0.5 + 0.5) * 255);
      d[i+1] = Math.round((ny*0.5 + 0.5) * 255);
      d[i+2] = 255; d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6, 6);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

function isLegMesh(o){
  const n1 = o.name || '';
  const n2 = (o.parent && o.parent.name) || '';
  return /^Table_legs/i.test(n1) || /^Table_legs/i.test(n2) || /^U_legs/i.test(n1) || /^U_legs/i.test(n2);
}

// Procedurally builds a U-shaped metal leg-pair sub-tree for a given table length.
// Output: a THREE.Group named "U_legs_{L}" containing two pairs of vertical posts
// joined by horizontal bottom bars, with mounting plates on top.
function buildULegs(lengthCm){
  const L = lengthCm / 100;          // metres
  const POST_W = 0.06, POST_D = 0.06; // square cross-section ~6 cm
  const POST_H = 0.69;                // height to under-table
  const SPREAD = 0.72;                // distance between the two vertical posts of one U
  const PLATE_W = 0.16, PLATE_T = 0.012, PLATE_D = 0.16;
  const INSET_Z = 0.18;               // how far in from each end of the tabletop the leg pair sits
  const BENCH_H = 0.42;               // bench seat height (for cross-bar to support bench)
  const BENCH_REACH = 0.55;           // outward arm length (toward the bench)

  const group = new THREE.Group();
  group.name = `U_legs_${lengthCm}`;

  const zPositions = [-(L/2 - INSET_Z), (L/2 - INSET_Z)];
  for (const z of zPositions){
    // Two vertical posts
    const postL = new THREE.Mesh(new THREE.BoxGeometry(POST_W, POST_H, POST_D), makeMetalMaterial());
    postL.position.set(-SPREAD/2, POST_H/2, z);
    const postR = new THREE.Mesh(new THREE.BoxGeometry(POST_W, POST_H, POST_D), makeMetalMaterial());
    postR.position.set( SPREAD/2, POST_H/2, z);

    // Horizontal bottom bar (the floor of the U)
    const bottom = new THREE.Mesh(
      new THREE.BoxGeometry(SPREAD + POST_W, POST_W, POST_D),
      makeMetalMaterial()
    );
    bottom.position.set(0, POST_W/2, z);

    // Top mounting plates
    const plateL = new THREE.Mesh(new THREE.BoxGeometry(PLATE_W, PLATE_T, PLATE_D), makeMetalMaterial());
    plateL.position.set(-SPREAD/2, POST_H + PLATE_T/2, z);
    const plateR = new THREE.Mesh(new THREE.BoxGeometry(PLATE_W, PLATE_T, PLATE_D), makeMetalMaterial());
    plateR.position.set( SPREAD/2, POST_H + PLATE_T/2, z);

    // Simple bench-support arms (so benches don't appear to float):
    // two horizontal arms extending outward from each post at bench height.
    const armGeom = new THREE.BoxGeometry(BENCH_REACH, POST_W*0.7, POST_D*0.7);
    const armL = new THREE.Mesh(armGeom, makeMetalMaterial());
    armL.position.set(-SPREAD/2 - BENCH_REACH/2, BENCH_H, z);
    const armR = new THREE.Mesh(armGeom, makeMetalMaterial());
    armR.position.set( SPREAD/2 + BENCH_REACH/2, BENCH_H, z);

    [postL, postR, bottom, plateL, plateR, armL, armR].forEach(m => {
      m.castShadow = true; m.receiveShadow = true;
      group.add(m);
    });
  }

  return group;
}

function makeMetalMaterial(){
  const m = new THREE.MeshStandardMaterial({
    color: legHex, metalness: 0.55, roughness: 0.45,
    normalMap: metalNormalTex,
    normalScale: new THREE.Vector2(0.28, 0.28),
  });
  m.userData.isMetal = true;
  return m;
}

async function loadAll(){
  metalNormalTex = makeMetalNormalMap();
  const [tex, w, x] = await Promise.all([loadWoodTex(), loadGLB(URL_W, 'angle'), loadGLB(URL_X, 'xset')]);
  woodTex = tex;
  models.W = w; models.X = x;
  for (const k of Object.keys(models)){
    const root = models[k];
    root.visible = false;
    root.traverse(o => {
      if (o.isMesh){
        o.castShadow = true; o.receiveShadow = true;
        // Read original material name BEFORE overwriting. In the source GLBs the
        // metal accents (backrest support brackets, hardware) use material name
        // 'base material' while wooden parts use 'base table'. Anything matching
        // 'base material' is treated as metal so it gets the leg color.
        const origMat = (o.material && o.material.name || '').toLowerCase();
        const isMetalAccent = origMat === 'base material';
        if (isLegMesh(o) || isMetalAccent){
          o.material = makeMetalMaterial();
        } else {
          const tex = alignWoodToMesh(o, woodTex);
          const m = new THREE.MeshStandardMaterial({ map: tex, color: 0xffffff, roughness: 0.78, metalness: 0.0 });
          m.userData.isWood = true; o.material = m;
        }
      }
    });
    scene.add(root);
  }
  // U-frame: attach procedurally-generated U-leg groups (one per Shopify length).
  for (const L of FAMILIES.U.lengths){
    const u = buildULegs(L);
    u.visible = false;
    models.X.add(u);
  }

  applyTint(tintHex); applyLegColor(legHex);
  document.getElementById('loading').classList.add('hidden');
  setFamily(currentFamily, true);
}

// Returns the scene root for a given family. U-family shares the X scene because
// the wooden parts (tabletop, benches, backrest) are reused; only the legs differ.
function rootForFamily(fam){
  if (fam === 'U') return models.X;
  return models[fam];
}

function applyTint(hex){
  const c = new THREE.Color(hex);
  for (const k of Object.keys(models)){
    if (!models[k]) continue;
    models[k].traverse(o => {
      if (o.isMesh && o.material && o.material.userData.isWood) o.material.color.copy(c);
    });
  }
}

function applyLegColor(hex){
  const c = new THREE.Color(hex);
  for (const k of Object.keys(models)){
    if (!models[k]) continue;
    models[k].traverse(o => {
      if (o.isMesh && o.material && o.material.userData.isMetal) o.material.color.copy(c);
    });
  }
}

function applyVisibility(){
  const fam = FAMILIES[currentFamily];
  const root = rootForFamily(currentFamily);
  if (!root) return;
  root.visible = true;
  for (const k of Object.keys(models)){
    if (models[k] && models[k] !== root) models[k].visible = false;
  }

  const renderL = closestNative(currentFamily, currentLength);
  const scaleZ  = currentLength / renderL;

  // Pass 1: hide every named asset, reset scales
  for (const L of fam.nativeLengths){
    root.traverse(o => {
      if (!o.name) return;
      const r = fam.match(o.name, L);
      if (r.top || r.legs || r.bench || r.backrest){
        o.visible = false;
        o.scale.z = 1;
      }
    });
  }
  // Also reset the other family's native leg/wood meshes (they share the X scene)
  if (currentFamily === 'U' || currentFamily === 'X'){
    root.traverse(o => {
      if (!o.name) return;
      if (/^Table_legs_X_|^U_legs_/.test(o.name)){ o.visible = false; o.scale.z = 1; }
    });
  }

  // Pass 2: enable the right pieces for currentLength using renderL, with scale
  const shouldShowBench = (fam.hasBenchChoice ? benchCount > 0 : true);
  const shouldShowBack  = (fam.hasBackrest ? backOn : false);

  // For "1 Sitzbank" we clip the bench mesh at x = 0 so only one side is shown.
  // The bench geometry is symmetric across x; clipping a half gives a clean look.
  const benchClipPlanes = (fam.hasBenchChoice && benchCount === 1)
    ? [ new THREE.Plane(new THREE.Vector3(1, 0, 0), 0) ] // keep x > 0 side
    : null;
  // Backrest follows the same logic (only relevant for W which has fixed backrest,
  // but apply for safety).
  const backClipPlanes = (fam.hasBenchChoice && benchCount === 1)
    ? [ new THREE.Plane(new THREE.Vector3(1, 0, 0), 0) ]
    : null;

  root.traverse(o => {
    if (!o.name) return;
    const r = fam.match(o.name, renderL);
    if (!(r.top || r.legs || r.bench || r.backrest)) return;
    let show = false;
    if (r.top)           show = true;
    else if (r.bench)    show = shouldShowBench;
    else if (r.backrest) show = shouldShowBack;
    else if (r.legs){
      if (currentFamily === 'U' && /^U_legs_/.test(o.name)) show = true;
      else if (currentFamily === 'X' && /^Table_legs_X_/.test(o.name)) show = true;
      else if (currentFamily === 'W' && /^Table_legs_W_/.test(o.name)) show = true;
    }
    if (show){
      o.visible = true;
      if (!/^U_legs_/.test(o.name)) o.scale.z = scaleZ;
      // Apply / remove clipping for benches & backrests
      if (o.isMesh && o.material){
        if (r.bench)         o.material.clippingPlanes = benchClipPlanes;
        else if (r.backrest) o.material.clippingPlanes = backClipPlanes;
        else                 o.material.clippingPlanes = null;
        o.material.needsUpdate = true;
      } else {
        // For groups, clip every child mesh
        o.traverse(c => {
          if (c.isMesh && c.material){
            if (r.bench)         c.material.clippingPlanes = benchClipPlanes;
            else if (r.backrest) c.material.clippingPlanes = backClipPlanes;
            else                 c.material.clippingPlanes = null;
            c.material.needsUpdate = true;
          }
        });
      }
    }
  });

  frameCameraToSelection();
  updateSummary();
  updatePrice();
}

function frameCameraToSelection(){
  const root = rootForFamily(currentFamily);
  if (!root) return;
  root.updateMatrixWorld(true);
  function ancestorsVisible(obj){ let x=obj; while(x){if(x.visible===false)return false;x=x.parent;} return true; }
  const box = new THREE.Box3();
  let any = false;
  root.traverse(o => {
    if (o.isMesh && ancestorsVisible(o)){
      const b = new THREE.Box3().setFromObject(o);
      if (isFinite(b.min.x) && isFinite(b.max.x)){ box.union(b); any = true; }
    }
  });
  if (!any) return;
  const center = new THREE.Vector3(); box.getCenter(center);
  const size = new THREE.Vector3(); box.getSize(size);
  controls.target.copy(center);
  const fov = camera.fov * Math.PI/180;
  const diag = size.length();
  const fitDist = (diag * 0.55) / Math.tan(fov/2) + 0.8;
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  if (dir.lengthSq() < 1e-4) dir.set(0.65, 0.45, 1).normalize();
  camera.position.copy(controls.target).add(dir.multiplyScalar(fitDist));
  camera.near = Math.max(0.05, fitDist/200);
  camera.far  = fitDist*20;
  camera.updateProjectionMatrix();
}

// === Live price (multi-product cache) ============================
// The Shopify parent page posts {source:'shopify-parent', type:'product-data', product:{...}}
// for each product the configurator might add to cart (Picknicktisch + Gartentisch).
// We keep them keyed by handle and resolve which to use based on the current family.
const productCache = Object.create(null); // handle → product object

function benchLabelDE(n){
  if (n === 0) return 'Keine Sitzbank';
  if (n === 1) return '1 Sitzbank';
  return '2 Sitzbänke';
}

function findVariantInProduct(product, fam, lengthCm, benches){
  if (!product || !product.variants) return null;
  const lenStr = String(lengthCm);
  const lenA = lenStr + 'cm';
  const lenB = lenStr + 'cm x 180cm';
  const benchStr = benchLabelDE(benches);
  return product.variants.find(v => {
    const opts = [v.option1, v.option2, v.option3].filter(Boolean);
    const hasLen = opts.some(o => o === lenA || o === lenB);
    if (!hasLen) return false;
    if (fam.legOption && opts.indexOf(fam.legOption) === -1) return false;
    if (fam.legOption && opts.indexOf(benchStr) === -1) return false;
    return true;
  }) || null;
}

function formatPriceCents(cents, currency, lang){
  // Shopify product.variants[].price is in MINOR units (cents)
  const value = (cents/100);
  try {
    return new Intl.NumberFormat(lang === 'en' ? 'en-DE' : (lang === 'nl' ? 'nl-NL' : 'de-DE'),
      { style:'currency', currency: currency || 'EUR' }).format(value);
  } catch(_) {
    return '€' + value.toFixed(2).replace('.', ',');
  }
}

function updatePrice(){
  const el = document.getElementById('priceAmount');
  const box = document.getElementById('priceBox');
  if (!el || !box) return;
  const fam = FAMILIES[currentFamily];
  const handle = fam.productHandle;
  const product = handle ? productCache[handle] : null;
  if (!product){
    box.hidden = true;
    return;
  }
  box.hidden = false;
  const benches = fam.hasBenchChoice ? benchCount : 2;
  const v = findVariantInProduct(product, fam, currentLength, benches);
  if (v){
    el.textContent = formatPriceCents(v.price, 'EUR', currentLang);
    el.classList.remove('loading');
  } else {
    el.textContent = '—';
    el.classList.add('loading');
  }
}

// Request product data from parent and listen for incoming product-data messages.
function requestProductData(){
  if (window.parent && window.parent !== window){
    try {
      window.parent.postMessage({source:'picnic-configurator', type:'request-product-data'}, '*');
    } catch(_){}
  }
}
window.addEventListener('message', e => {
  const d = e.data;
  if (!d || d.source !== 'shopify-parent') return;
  if (d.type === 'product-data' && d.product && d.product.handle){
    productCache[d.product.handle] = d.product;
    updatePrice();
  }
});
// Retry handshake a few times — iframe may load before the parent listener is wired
let __pdRetry = 0;
const __pdInt = setInterval(() => {
  // Stop once we have any data, or after ~15 attempts
  if (Object.keys(productCache).length || __pdRetry++ > 14){
    clearInterval(__pdInt);
    return;
  }
  requestProductData();
}, 600);

function updateSummary(){
  const fam = FAMILIES[currentFamily];
  const parts = [t('part_tabletop'), t('part_legs')];
  const effectiveBenches = fam.hasBenchChoice ? benchCount : 2;
  if (effectiveBenches > 0) parts.push(t('part_benches'));
  if (fam.hasBackrest && backOn) parts.push(t('part_backrest'));
  let benchLine = '';
  if (fam.hasBenchChoice){
    benchLine = `<div class="dim"><span>${t('bench_count')}</span><b>${t('benches_' + benchCount)}</b></div>`;
  }
  document.getElementById('summary').innerHTML = `
    <div class="dim"><span>${t('sum_frame')}</span><b>${fam.label}</b></div>
    <div class="dim"><span>${t('sum_length')}</span><b>${currentLength} cm</b></div>
    <div class="dim"><span>${t('sum_tabletop')}</span><b>${fam.tabletop}</b></div>
    <div class="dim"><span>${t('sum_height')}</span><b>${fam.height}</b></div>
    ${benchLine}
    <div class="dim"><span>${t('sum_included')}</span><b>${parts.join(', ')}</b></div>
  `;
}
window.__updateSummary = updateSummary;

function renderLengths(){
  const wrap = document.getElementById('lengths'); wrap.innerHTML = '';
  const fam = FAMILIES[currentFamily];
  fam.lengths.forEach(L => {
    const b = document.createElement('button');
    b.className = 'chip' + (L===currentLength?' active':'');
    b.textContent = L;
    b.onclick = () => { currentLength = L; renderLengths(); applyVisibility(); };
    wrap.appendChild(b);
  });
}

function setFamily(fam, force){
  if (!force && fam === currentFamily) return;
  if (!FAMILIES[fam]) return;
  currentFamily = fam;
  const F = FAMILIES[fam];
  const ls = F.lengths;
  if (!ls.includes(currentLength)){
    let best = ls[0], bd = Infinity;
    for (const v of ls){ const d = Math.abs(v - currentLength); if (d<bd){bd=d;best=v;} }
    currentLength = best;
  }
  document.querySelectorAll('.frame').forEach(el => el.classList.toggle('active', el.dataset.fam===fam));

  // Show only the options that this family supports
  const rowBack   = document.getElementById('rowBackrest');
  const rowBench  = document.getElementById('rowBenches');
  if (rowBack)  rowBack.hidden  = !F.hasBackrest;
  if (rowBench) rowBench.hidden = !F.hasBenchChoice;
  if (F.hasBackrest)   { backOn = true;  const c = document.getElementById('backOn'); if (c) c.checked = true; }
  if (!F.hasBenchChoice){ benchCount = 2; }

  renderLengths();
  renderBenches();
  applyVisibility();
}

function renderBenches(){
  const wrap = document.getElementById('benchChips'); if (!wrap) return;
  wrap.innerHTML = '';
  [0,1,2].forEach(n => {
    const b = document.createElement('button');
    b.className = 'chip' + (n===benchCount?' active':'');
    b.textContent = t('benches_' + n);
    b.onclick = () => { benchCount = n; renderBenches(); applyVisibility(); };
    wrap.appendChild(b);
  });
}

document.querySelectorAll('.frame').forEach(el => el.addEventListener('click', () => setFamily(el.dataset.fam, false)));
document.getElementById('backOn').addEventListener('change', e => { backOn = e.target.checked; applyVisibility(); });
document.getElementById('resetView').addEventListener('click', frameCameraToSelection);

// Share — build URL with config and copy to clipboard, then show toast
function showToast(text){
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = text;
  el.hidden = false;
  requestAnimationFrame(() => el.classList.add('show'));
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.hidden = true, 300);
  }, 1800);
}
document.getElementById('shareBtn').addEventListener('click', () => {
  const cfg = getConfig();
  const url = new URL(location.href);
  url.searchParams.set('family', cfg.family);
  url.searchParams.set('length', cfg.length_cm);
  url.searchParams.set('back',   cfg.backrest ? 1 : 0);
  url.searchParams.set('benches', cfg.benches);
  url.searchParams.set('wood',   cfg.wood_tone_key);
  url.searchParams.set('leg',    cfg.leg_color_key);
  url.searchParams.set('lang',   cfg.lang);
  const out = url.toString();
  // Prefer Web Share API on mobile
  if (navigator.share && /Mobi|Android|iPhone/i.test(navigator.userAgent)){
    navigator.share({ title: t('title'), url: out }).catch(()=>{});
  } else if (navigator.clipboard){
    navigator.clipboard.writeText(out).then(() => showToast(t('share_copied'))).catch(()=>{});
  } else {
    prompt(t('share'), out);
  }
});
let shadowsOn = true;
document.getElementById('toggleShadow').addEventListener('click', () => {
  shadowsOn = !shadowsOn;
  sun.castShadow = shadowsOn;
  ground.visible = shadowsOn;
});

document.querySelectorAll('#stains .swatch').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('#stains .swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  tintHex = parseInt(el.dataset.tint, 16);
  tintKey = el.getAttribute('data-i18n-title') || 'natural';
  applyTint(tintHex);
}));
document.querySelectorAll('#legColors .swatch').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('#legColors .swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  legHex = parseInt(el.dataset.leg, 16);
  legKey = el.getAttribute('data-i18n-title') || 'black';
  applyLegColor(legHex);
}));

// Language buttons
document.querySelectorAll('.langbtn').forEach(b => b.addEventListener('click', () => applyLang(b.dataset.lang)));

// === Add to cart — sends config to parent (Shopify storefront) via postMessage ===
function getConfig(){
  const fam = FAMILIES[currentFamily];
  const benches = fam.hasBenchChoice ? benchCount : 2;
  return {
    family: currentFamily,
    family_label: fam.label,
    productHandle: fam.productHandle || '',
    legOption: fam.legOption || '',           // 'X-Tischbeine' | 'U-Tischbeine' | ''
    length_cm: currentLength,
    backrest: fam.hasBackrest ? backOn : false,
    benches: benches,                          // 0 / 1 / 2
    wood_tone: t(tintKey),
    wood_tone_key: tintKey,
    leg_color: t(legKey),
    leg_color_key: legKey,
    tabletop: fam.tabletop,
    height:   fam.height,
    lang: currentLang,
  };
}

document.getElementById('addBtn').addEventListener('click', () => {
  const cfg = getConfig();
  // 1) Tell the parent storefront — it will handle /cart/add.js with line item properties
  let sentToParent = false;
  if (window.parent && window.parent !== window){
    try {
      window.parent.postMessage({ source:'picnic-configurator', type:'add-to-cart', config: cfg }, '*');
      sentToParent = true;
    } catch(_){}
  }
  // 2) Also copy a shareable link with the config encoded in the URL
  try {
    const url = new URL(location.href);
    url.searchParams.set('family', cfg.family);
    url.searchParams.set('length', cfg.length_cm);
    url.searchParams.set('back', cfg.backrest?1:0);
    url.searchParams.set('wood', cfg.wood_tone_key);
    url.searchParams.set('leg',  cfg.leg_color_key);
    url.searchParams.set('lang', cfg.lang);
    navigator.clipboard?.writeText(url.toString()).catch(()=>{});
  } catch(_){}
  // 3) Visual feedback (only when no parent listener available)
  if (!sentToParent){
    alert(`${t('alert_added')}\n${cfg.family_label} ${cfg.length_cm} cm\n${t('backrest')}: ${cfg.backrest?'✓':'✗'}\n${t('wood_tone')}: ${cfg.wood_tone}\n${t('leg_color')}: ${cfg.leg_color}\n\n${t('alert_copied')}`);
  }
});

// === Initial query string apply ===
if (QS.has('family') && FAMILIES[QS.get('family')]) currentFamily = QS.get('family');
if (QS.has('length')) currentLength = parseInt(QS.get('length'),10) || currentLength;
if (QS.has('back'))   backOn = QS.get('back')==='1';
document.getElementById('backOn').checked = backOn;
if (QS.has('wood')){
  const k = QS.get('wood');
  const el = document.querySelector(`#stains .swatch[data-i18n-title="${k}"]`);
  if (el){ el.click(); }
}
if (QS.has('leg')){
  const k = QS.get('leg');
  const el = document.querySelector(`#legColors .swatch[data-i18n-title="${k}"]`);
  if (el){ el.click(); }
}

// Apply language (now that DOM listeners are bound)
applyLang(currentLang);

function resize(){
  const r = canvas.parentElement.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

function animate(){
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

loadAll().catch(err => {
  console.error(err);
  document.getElementById('loading').innerHTML = '<span style="color:#a00">' + t('failed_load') + '</span>';
});
</script>
