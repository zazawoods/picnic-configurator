<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>3D Configurator — Picnic Sets</title>

<!-- Asset hints: start network as early as possible -->
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="dns-prefetch"  href="https://www.gstatic.com">
<link rel="preload" as="fetch" crossorigin href="https://raw.githubusercontent.com/zazawoods/picnic-configurator/main/angle.glb">
<link rel="preload" as="fetch" crossorigin href="https://raw.githubusercontent.com/zazawoods/picnic-configurator/main/xset.glb">
<link rel="preload" as="image" href="https://raw.githubusercontent.com/zazawoods/picnic-configurator/main/wood.jpg" crossorigin>
<style>
  :root{
    --bg:#f3f1ec;
    --bg2:#e9e5dd;
    --ink:#1c1a16;
    --muted:#6b6660;
    --accent:#1c1a16;
    --line:rgba(0,0,0,.08);
    --card:#ffffff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Inter,Arial,sans-serif;-webkit-font-smoothing:antialiased}
  #app{position:fixed;inset:0;display:flex}
  #stage{flex:1;position:relative;background:radial-gradient(ellipse at 50% 35%,#fbfaf7 0%,var(--bg) 55%,var(--bg2) 100%)}
  canvas{display:block;width:100%;height:100%;outline:none}
  #panel{
    width:340px;background:var(--card);border-left:1px solid var(--line);
    padding:22px 22px 28px;overflow:auto;display:flex;flex-direction:column;gap:22px;
    box-shadow:-10px 0 30px rgba(0,0,0,.04)
  }
  h1{font-size:18px;letter-spacing:.2px;margin:0 0 4px;font-weight:600}
  .sub{font-size:12px;color:var(--muted);margin-bottom:12px}
  .group{display:flex;flex-direction:column;gap:8px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:2px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{
    padding:8px 10px;border:1px solid var(--line);border-radius:999px;background:#fff;cursor:pointer;font-size:13px;color:var(--ink);
    transition:.12s ease;
  }
  .chip:hover{border-color:#bbb}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .chip[disabled]{opacity:.35;cursor:not-allowed}
  .frames{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .frame{
    border:1px solid var(--line);border-radius:14px;padding:12px 8px;background:#fff;cursor:pointer;text-align:center;
    transition:.15s ease;display:flex;flex-direction:column;align-items:center;gap:6px;
  }
  .frame:hover{border-color:#bbb}
  .frame.active{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent)}
  .frame svg{width:72px;height:44px;display:block}
  .frame .nm{font-size:13px;font-weight:600}
  .frame .sz{font-size:11px;color:var(--muted)}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}
  .switch{position:relative;width:36px;height:20px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#dcd8d0;border-radius:999px;transition:.15s}
  .slider:after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.15s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider:after{transform:translateX(16px)}
  .switch input:disabled + .slider{opacity:.4;cursor:not-allowed}
  .stones{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .swatch{aspect-ratio:1;border-radius:10px;border:2px solid transparent;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(0,0,0,.06)}
  .swatch.active{border-color:var(--accent)}
  .summary{font-size:13px;color:var(--ink);background:#faf8f3;border:1px solid var(--line);border-radius:12px;padding:12px}
  .summary b{font-weight:600}
  .summary .dim{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted)}
  .summary .dim b{color:var(--ink)}
  .btn{display:block;width:100%;padding:13px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.2px}
  .btn:hover{opacity:.9}
  .hud{position:absolute;left:16px;bottom:16px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);padding:10px 14px;border-radius:12px;font-size:12px;color:var(--muted);border:1px solid var(--line)}
  .hud kbd{background:#fff;border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--ink)}
  .loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(243,241,236,.85);z-index:20;font-size:14px;color:var(--muted)}
  .loading.hidden{display:none}
  .spin{width:18px;height:18px;border:2px solid #ccc;border-top-color:#222;border-radius:50%;animation:r .8s linear infinite;margin-right:10px}
  @keyframes r{to{transform:rotate(360deg)}}
  .small{font-size:11px;color:var(--muted)}
  .toolbar{position:absolute;right:16px;top:16px;display:flex;gap:6px}
  .tbtn{background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:12px;cursor:pointer;color:var(--ink)}
  .tbtn:hover{background:#fff}
  @media (max-width:760px){
    #app{flex-direction:column}
    #panel{width:100%;border-left:0;border-top:1px solid var(--line);max-height:55vh}
    #stage{flex:1 1 45vh;min-height:45vh}
  }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="c"></canvas>
    <div class="toolbar">
      <button class="tbtn" id="resetView">Reset view</button>
      <button class="tbtn" id="toggleShadow">Shadows</button>
    </div>
    <div class="hud">
      <kbd>LMB</kbd> rotate · <kbd>wheel</kbd> zoom · <kbd>RMB</kbd> pan
    </div>
    <div class="loading" id="loading"><div class="spin"></div><span>Loading models…</span></div>
  </div>

  <aside id="panel">
    <div>
      <h1>Picnic Set Configurator</h1>
      <div class="sub">Table + benches. Assembly fits the selected length.</div>
    </div>

    <div class="group">
      <div class="lbl">Frame</div>
      <div class="frames" id="frames">
        <button class="frame active" data-fam="W">
          <svg viewBox="0 0 64 40"><g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="14" width="52" height="3"/><path d="M14 17 L20 36"/><path d="M50 17 L44 36"/><path d="M16 28 H48"/></g></svg>
          <span class="nm">Angle (W)</span>
          <span class="sz">160–400 cm</span>
        </button>
        <button class="frame" data-fam="X">
          <svg viewBox="0 0 64 40"><g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="6" y="10" width="52" height="3"/><path d="M14 13 L26 36"/><path d="M26 13 L14 36"/><path d="M50 13 L38 36"/><path d="M38 13 L50 36"/><path d="M16 24 H48"/></g></svg>
          <span class="nm">X-frame</span>
          <span class="sz">160–400 cm</span>
        </button>
      </div>
    </div>

    <div class="group">
      <div class="lbl">Length, cm</div>
      <div class="chips" id="lengths"></div>
    </div>

    <div class="group">
      <div class="lbl">Options</div>
      <label class="row">
        <span>Backrest</span>
        <span class="switch"><input type="checkbox" id="backOn" checked><span class="slider"></span></span>
      </label>
    </div>

    <div class="group">
      <div class="lbl">Wood tone</div>
      <div class="stones" id="stains">
        <div class="swatch active" data-tint="ffffff" title="Natural" style="background:#d9b486"></div>
        <div class="swatch" data-tint="b88b5e" title="Oak"     style="background:#a87142"></div>
        <div class="swatch" data-tint="7d4f2e" title="Walnut"  style="background:#6b4324"></div>
        <div class="swatch" data-tint="3b2a1e" title="Smoked"  style="background:#2a1c12"></div>
      </div>
    </div>

    <div class="group">
      <div class="lbl">Leg color</div>
      <div class="stones" id="legColors">
        <div class="swatch active" data-leg="0d0d0d" title="Black (RAL 9005)"      style="background:#0d0d0d"></div>
        <div class="swatch"        data-leg="2c2f31" title="Anthracite (RAL 7016)" style="background:#2c2f31"></div>
        <div class="swatch"        data-leg="9aa0a4" title="Light grey (RAL 7035)" style="background:#9aa0a4"></div>
        <div class="swatch"        data-leg="ebe8e0" title="White (RAL 9010)"      style="background:#ebe8e0"></div>
      </div>
    </div>

    <div class="summary" id="summary"></div>

    <button class="btn" id="addBtn">Add to cart</button>
    <div class="small" style="text-align:center">Prototype. Geometry and textures sourced from your GLB files.</div>
  </aside>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// --- Asset URLs. Binaries are served from GitHub raw to bypass any host limits.
const CDN      = 'https://raw.githubusercontent.com/zazawoods/picnic-configurator/main';
const URL_W    = CDN + '/angle.glb';
const URL_X    = CDN + '/xset.glb';
const URL_WOOD = CDN + '/wood.jpg';

// --- Family configuration ---
const FAMILIES = {
  W: { lengths: [160,200,250,300,350,400],
       label: 'Angle (W)',
       tabletop: '89×3 cm',
       height: '≈70 cm',
       match: (name, L) => ({
         backrest: name === `Backrest_W_${L}`,
         bench:    name === `2benchplanks_W__${L}`,
         legs:     name === `Table_legs_W_${L}`,
         top:      name === `Table_top_W_${L}`,
       })},
  X: { lengths: [160,200,250,300,350,400],
       label: 'X-frame',
       tabletop: '89×4.5 cm',
       height: '≈70.5 cm',
       match: (name, L) => ({
         backrest: name === `Backrest_X_${L}`,
         bench:    name === `2benchplanks_X_${L}`,
         legs:     name === `Table_legs_X_${L}`,
         top:      name === `Table_top_X_${L}`,
       })},
};

// --- Three.js setup ---
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf3f1ec);

const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

const camera = new THREE.PerspectiveCamera(35, 1, 0.05, 100);
camera.position.set(3.4, 1.9, 4.0);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 0.45, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.6;
controls.maxDistance = 14;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minPolarAngle = Math.PI * 0.08;

const hemi = new THREE.HemisphereLight(0xffffff, 0xb8b2a6, 0.55);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 2.0);
sun.position.set(4.2, 6.5, 3.1);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far  = 20;
sun.shadow.camera.left  = -4.5;
sun.shadow.camera.right =  4.5;
sun.shadow.camera.top   =  3.5;
sun.shadow.camera.bottom= -3.5;
sun.shadow.bias = -0.0002;
sun.shadow.normalBias = 0.02;
scene.add(sun);
scene.add(sun.target);

const ground = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.ShadowMaterial({ opacity: 0.28 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

const floorTint = new THREE.Mesh(
  new THREE.CircleGeometry(8, 64),
  new THREE.MeshStandardMaterial({ color:0xe9e5dd, roughness:1.0, metalness:0.0 })
);
floorTint.rotation.x = -Math.PI/2;
floorTint.position.y = -0.001;
floorTint.receiveShadow = true;
scene.add(floorTint);

// --- Loading ---
const draco = new DRACOLoader();
draco.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
draco.setDecoderConfig({ type: 'js' });
const loader = new GLTFLoader();
loader.setDRACOLoader(draco);

const models = { W:null, X:null };
let woodTex = null;
let metalNormalTex = null;
let currentFamily = 'W';
let currentLength = 250;
let backOn = true;
let tintHex = 0xffffff;
let legHex  = 0x0d0d0d;

function loadGLB(url){
  return new Promise((res, rej) => {
    loader.load(url, g => res(g.scene), undefined, rej);
  });
}

function loadWoodTex(){
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const t = new THREE.Texture(img);
      t.colorSpace = THREE.SRGBColorSpace;
      t.wrapS = t.wrapT = THREE.RepeatWrapping;
      t.anisotropy = renderer.capabilities.getMaxAnisotropy();
      t.needsUpdate = true;
      res(t);
    };
    img.onerror = rej;
    img.src = URL_WOOD;
  });
}

// In this dataset Z is the LENGTH axis for every wood part (table top, bench planks,
// backrests). Earlier auto-detection failed for short lengths because the bbox X
// (which spans both benches/backrests on either side of the table) is wider than the
// actual table length when length < 200 cm. So we hardcode the grain axis to Z.
function alignWoodToMesh(mesh, baseTex){
  const geom = mesh.geometry;
  const PRI = 2; // Z — grain direction (along the length of the wood)
  const SEC = 0; // X — across the plank
  const tile = 0.7;
  const pos = geom.attributes.position;
  const arr = new Float32Array(pos.count * 2);
  for (let i = 0; i < pos.count; i++){
    const p = [pos.getX(i), pos.getY(i), pos.getZ(i)];
    arr[i*2]     = p[PRI] / tile;
    arr[i*2 + 1] = p[SEC] / tile;
  }
  geom.setAttribute('uv', new THREE.BufferAttribute(arr, 2));
  return baseTex;
}

// Procedural normal map for powder-coated metal — subtle "orange peel" microsurface.
function makeMetalNormalMap(){
  const size = 256;
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const img = ctx.createImageData(size, size);
  const d = img.data;
  // Generate slight 2D noise → encode as RG, keep B=255 (z-up flat-ish normal)
  for (let y = 0; y < size; y++){
    for (let x = 0; x < size; x++){
      const i = (y*size + x) * 4;
      // Mix two noise frequencies for a more natural feel
      const n1x = (Math.random()-0.5);
      const n1y = (Math.random()-0.5);
      const nx = n1x * 0.18;
      const ny = n1y * 0.18;
      d[i  ] = Math.max(0, Math.min(255, Math.round((nx*0.5 + 0.5) * 255)));
      d[i+1] = Math.max(0, Math.min(255, Math.round((ny*0.5 + 0.5) * 255)));
      d[i+2] = 255;
      d[i+3] = 255;
    }
  }
  ctx.putImageData(img, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(6, 6);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

// Tell whether a mesh belongs to a "legs" subassembly (named Table_legs_* on the node
// or on the parent group for multi-primitive cases).
function isLegMesh(o){
  const n1 = o.name || '';
  const n2 = (o.parent && o.parent.name) || '';
  return /^Table_legs/i.test(n1) || /^Table_legs/i.test(n2);
}

function makeMetalMaterial(){
  const m = new THREE.MeshStandardMaterial({
    color: legHex,                // dynamic via applyLegColor
    metalness: 0.55,              // matte metallic
    roughness: 0.45,              // not glossy
    normalMap: metalNormalTex,    // powder-coat micro surface
    normalScale: new THREE.Vector2(0.28, 0.28),
  });
  m.userData.isMetal = true;
  return m;
}

async function loadAll(){
  metalNormalTex = makeMetalNormalMap();
  const [tex, w, x] = await Promise.all([
    loadWoodTex(),
    loadGLB(URL_W),
    loadGLB(URL_X),
  ]);
  woodTex = tex;
  models.W = w; models.X = x;
  for (const k of Object.keys(models)){
    const root = models[k];
    root.visible = false;
    root.traverse(o => {
      if (o.isMesh){
        o.castShadow = true;
        o.receiveShadow = true;
        if (isLegMesh(o)){
          o.material = makeMetalMaterial();
        } else {
          const tex = alignWoodToMesh(o, woodTex);
          const m = new THREE.MeshStandardMaterial({
            map: tex,
            color: 0xffffff,
            roughness: 0.78,
            metalness: 0.0,
          });
          m.userData.isWood = true;
          o.material = m;
        }
      }
    });
    scene.add(root);
  }
  applyTint(tintHex);
  applyLegColor(legHex);
  document.getElementById('loading').classList.add('hidden');
  setFamily(currentFamily, true);
}

function applyLegColor(hex){
  const c = new THREE.Color(hex);
  for (const k of Object.keys(models)){
    if (!models[k]) continue;
    models[k].traverse(o => {
      if (o.isMesh && o.material && o.material.userData.isMetal){
        o.material.color.copy(c);
      }
    });
  }
}

function applyTint(hex){
  const c = new THREE.Color(hex);
  for (const k of Object.keys(models)){
    if (!models[k]) continue;
    models[k].traverse(o => {
      if (o.isMesh && o.material && o.material.userData.isWood){
        o.material.color.copy(c);
      }
    });
  }
}

// --- Selection logic ---
// Toggle visibility on the named gltf node (Mesh for single-prim, Group for multi-prim).
// Benches are mandatory (no toggle). Backrest is the only optional component.
function applyVisibility(){
  const fam = FAMILIES[currentFamily];
  const root = models[currentFamily];
  if (!root) return;
  root.visible = true;
  for (const k of Object.keys(models)){
    if (k !== currentFamily && models[k]) models[k].visible = false;
  }
  for (const L of fam.lengths){
    root.traverse(o => {
      if (!o.name) return;
      const r = fam.match(o.name, L);
      if (!(r.top || r.legs || r.bench || r.backrest)) return;
      if (L !== currentLength){
        o.visible = false;
      } else {
        if (r.top || r.legs || r.bench) o.visible = true;
        else if (r.backrest)            o.visible = backOn;
      }
    });
  }
  frameCameraToSelection();
  updateSummary();
}

function frameCameraToSelection(){
  const root = models[currentFamily];
  if (!root) return;
  root.updateMatrixWorld(true);
  function ancestorsVisible(obj){
    let x = obj;
    while (x){ if (x.visible === false) return false; x = x.parent; }
    return true;
  }
  const box = new THREE.Box3();
  let any = false;
  root.traverse(o => {
    if (o.isMesh && ancestorsVisible(o)){
      const b = new THREE.Box3().setFromObject(o);
      if (isFinite(b.min.x) && isFinite(b.max.x)){
        box.union(b); any = true;
      }
    }
  });
  if (!any) return;
  const center = new THREE.Vector3(); box.getCenter(center);
  const size = new THREE.Vector3(); box.getSize(size);
  controls.target.copy(center);
  const fov = camera.fov * Math.PI/180;
  const diag = size.length();
  const fitDist = (diag * 0.55) / Math.tan(fov/2) + 0.8;
  const dir = new THREE.Vector3().subVectors(camera.position, controls.target).normalize();
  if (dir.lengthSq() < 1e-4) dir.set(0.65, 0.45, 1).normalize();
  camera.position.copy(controls.target).add(dir.multiplyScalar(fitDist));
  camera.near = Math.max(0.05, fitDist/200);
  camera.far  = fitDist*20;
  camera.updateProjectionMatrix();
}

function updateSummary(){
  const fam = FAMILIES[currentFamily];
  const components = ['Tabletop', 'Legs', 'Benches'];
  if (backOn) components.push('Backrest');
  document.getElementById('summary').innerHTML = `
    <div class="dim"><span>Frame</span><b>${fam.label}</b></div>
    <div class="dim"><span>Length</span><b>${currentLength} cm</b></div>
    <div class="dim"><span>Tabletop</span><b>${fam.tabletop}</b></div>
    <div class="dim"><span>Height</span><b>${fam.height}</b></div>
    <div class="dim"><span>Included</span><b>${components.join(', ')}</b></div>
  `;
}

// --- UI ---
function renderLengths(){
  const wrap = document.getElementById('lengths');
  wrap.innerHTML = '';
  const fam = FAMILIES[currentFamily];
  fam.lengths.forEach(L => {
    const b = document.createElement('button');
    b.className = 'chip' + (L===currentLength?' active':'');
    b.textContent = L;
    b.onclick = () => { currentLength = L; renderLengths(); applyVisibility(); };
    wrap.appendChild(b);
  });
}

function setFamily(fam, force){
  if (!force && fam === currentFamily) return;
  if (!FAMILIES[fam]) return;
  currentFamily = fam;
  const ls = FAMILIES[fam].lengths;
  if (!ls.includes(currentLength)){
    let best = ls[0], bd = Infinity;
    for (const v of ls){ const d = Math.abs(v - currentLength); if (d<bd){bd=d;best=v;} }
    currentLength = best;
  }
  document.querySelectorAll('.frame').forEach(el => el.classList.toggle('active', el.dataset.fam===fam));
  renderLengths();
  applyVisibility();
}

document.querySelectorAll('.frame').forEach(el => el.addEventListener('click', () => setFamily(el.dataset.fam, false)));
document.getElementById('backOn').addEventListener('change', e => { backOn = e.target.checked; applyVisibility(); });
document.getElementById('resetView').addEventListener('click', frameCameraToSelection);
let shadowsOn = true;
document.getElementById('toggleShadow').addEventListener('click', () => {
  shadowsOn = !shadowsOn;
  sun.castShadow = shadowsOn;
  ground.visible = shadowsOn;
});
// Wood-tone swatches
document.querySelectorAll('#stains .swatch').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('#stains .swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  tintHex = parseInt(el.dataset.tint, 16);
  applyTint(tintHex);
}));

// Leg-color swatches
document.querySelectorAll('#legColors .swatch').forEach(el => el.addEventListener('click', () => {
  document.querySelectorAll('#legColors .swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  legHex = parseInt(el.dataset.leg, 16);
  applyLegColor(legHex);
}));
document.getElementById('addBtn').addEventListener('click', () => {
  const url = new URL(location.href);
  url.searchParams.set('family', currentFamily);
  url.searchParams.set('length', currentLength);
  url.searchParams.set('back', backOn?1:0);
  navigator.clipboard?.writeText(url.toString()).catch(()=>{});
  alert(`Configuration: ${currentFamily} ${currentLength} cm\nBackrest: ${backOn?'yes':'no'}\n\nShareable link copied to clipboard.`);
});

// Initial query string
const q = new URLSearchParams(location.search);
if (q.has('family') && FAMILIES[q.get('family')]) currentFamily = q.get('family');
if (q.has('length')) currentLength = parseInt(q.get('length'),10) || currentLength;
if (q.has('back'))   backOn = q.get('back')==='1';
document.getElementById('backOn').checked = backOn;

function resize(){
  const r = canvas.parentElement.getBoundingClientRect();
  renderer.setSize(r.width, r.height, false);
  camera.aspect = r.width / r.height;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

function animate(){
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

loadAll().catch(err => {
  console.error(err);
  document.getElementById('loading').innerHTML = '<span style="color:#a00">Failed to load models. See console.</span>';
});
</script>
</body>
</html>
